kind = "web"
previewPath = "/"
title = "Ayan's Freelance"
version = "1.0.0"
id = "artifacts/ayan-freelance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25860

[services.development]
run = "pnpm --filter @workspace/ayan-freelance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ayan-freelance", "run", "build" ]
publicDir = "artifacts/ayan-freelance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25860"
BASE_PATH = "/"
